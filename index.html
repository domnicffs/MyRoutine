<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Grind</title>
<link rel="icon" type="image/png" href="icon.png">
<link rel="apple-touch-icon" href="icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Daily Grind">
<meta name="theme-color" content="#0a0a0f">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a0f;
  --surface: #111118;
  --surface2: #1a1a24;
  --border: #2a2a3a;
  --accent: #c8f03c;
  --accent2: #7b5ea7;
  --accent3: #f03c6e;
  --text: #f0f0f8;
  --muted: #6b6b88;
  --gold: #ffd700;
  --done: #3cf08a;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: 'Syne', sans-serif; min-height: 100vh; overflow-x: hidden; }

header {
  position: sticky; top: 0; z-index: 100;
  background: rgba(10,10,15,0.95); backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  padding: 0.75rem 1.25rem;
  display: flex; align-items: center; justify-content: space-between;
}
.logo { font-family: 'Space Mono', monospace; font-size: 13px; color: var(--accent); letter-spacing: 0.05em; }
.header-right { display: flex; align-items: center; gap: 8px; }
.xp-badge { background: var(--surface2); border: 1px solid var(--border); border-radius: 20px; padding: 4px 10px; font-size: 12px; font-weight: 700; color: var(--gold); font-family: 'Space Mono', monospace; }
.streak-badge { background: var(--surface2); border: 1px solid var(--border); border-radius: 20px; padding: 4px 10px; font-size: 12px; font-weight: 700; color: var(--accent3); font-family: 'Space Mono', monospace; }
.icon-btn { background: none; border: 1px solid var(--border); color: var(--muted); font-size: 14px; padding: 4px 8px; border-radius: 6px; cursor: pointer; transition: all 0.15s; }
.icon-btn:hover { border-color: var(--accent); color: var(--accent); }

main { position: relative; z-index: 1; padding: 1rem 1.25rem; max-width: 480px; margin: 0 auto; }

.level-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 1rem; margin-bottom: 1rem; display: flex; align-items: center; gap: 12px; }
.level-icon { width: 40px; height: 40px; border-radius: 10px; background: var(--surface2); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
.level-info { flex: 1; }
.level-name { font-size: 14px; font-weight: 700; }
.level-sub { font-size: 11px; color: var(--muted); font-family: 'Space Mono', monospace; }
.level-xp-wrap { background: var(--surface2); border-radius: 4px; height: 4px; margin-top: 5px; overflow: hidden; }
.level-xp-bar { height: 100%; background: var(--accent2); border-radius: 4px; transition: width 0.4s; }

#quote-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 0.85rem 1rem; margin-bottom: 1rem; border-left: 3px solid var(--accent2); }
#quote-label { font-size: 10px; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; font-family: 'Space Mono', monospace; margin-bottom: 5px; }
#quote-text { font-size: 12px; color: var(--text); font-style: italic; line-height: 1.5; }
#quote-author { font-size: 11px; color: var(--accent); font-family: 'Space Mono', monospace; margin-top: 4px; }

.day-nav { display: flex; gap: 6px; margin-bottom: 1rem; overflow-x: auto; padding-bottom: 4px; scrollbar-width: none; }
.day-nav::-webkit-scrollbar { display: none; }
.day-pill { flex-shrink: 0; padding: 6px 14px; border-radius: 20px; border: 1px solid var(--border); background: var(--surface); color: var(--muted); font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.15s; position: relative; }
.day-pill.active { background: var(--accent); color: #000; border-color: var(--accent); }
.day-pill .day-dot { position: absolute; top: 4px; right: 4px; width: 6px; height: 6px; border-radius: 50%; background: var(--done); display: none; }
.day-pill.has-progress .day-dot { display: block; }

.today-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 1rem; margin-bottom: 1rem; }
.today-label { font-size: 10px; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; font-family: 'Space Mono', monospace; margin-bottom: 3px; }
.today-day { font-size: 24px; font-weight: 800; line-height: 1; margin-bottom: 8px; }
.progress-wrap { background: var(--surface2); border-radius: 4px; height: 6px; overflow: hidden; margin-bottom: 5px; }
.progress-bar { height: 100%; background: var(--accent); border-radius: 4px; transition: width 0.4s ease; }
.progress-label { font-size: 11px; color: var(--muted); font-family: 'Space Mono', monospace; display: flex; justify-content: space-between; }

.section-label { font-size: 10px; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; font-family: 'Space Mono', monospace; margin: 1rem 0 0.5rem; }
.task-list { display: flex; flex-direction: column; gap: 6px; }

.task-wrap { position: relative; }
.task {
  background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
  padding: 0.85rem 0.85rem 0.85rem 1rem;
  display: flex; align-items: flex-start; gap: 10px;
  position: relative; overflow: hidden; transition: border-color 0.2s;
}
.task::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; background: var(--task-color, var(--accent2)); border-radius: 3px 0 0 3px; }
.task:active { transform: scale(0.99); }
.task.done { background: rgba(60,240,138,0.04); border-color: rgba(60,240,138,0.2); }
.task.done .task-title { text-decoration: line-through; color: var(--muted); }
.task.done .task-time { color: var(--muted); }

.task-check { width: 20px; height: 20px; border-radius: 5px; border: 1.5px solid var(--border); background: var(--surface2); flex-shrink: 0; display: flex; align-items: center; justify-content: center; transition: all 0.2s; margin-top: 1px; cursor: pointer; }
.task.done .task-check { background: var(--done); border-color: var(--done); }
.task-check svg { display: none; }
.task.done .task-check svg { display: block; }

.task-body { flex: 1; min-width: 0; cursor: pointer; }
.task-time { font-size: 11px; color: var(--accent); font-family: 'Space Mono', monospace; margin-bottom: 2px; }
.task-title { font-size: 14px; font-weight: 600; line-height: 1.3; }
.task-sub { font-size: 12px; color: var(--muted); margin-top: 2px; }

.task-actions { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; flex-shrink: 0; }
.task-xp { font-size: 10px; font-family: 'Space Mono', monospace; color: var(--gold); font-weight: 700; padding: 2px 6px; background: rgba(255,215,0,0.08); border-radius: 8px; border: 1px solid rgba(255,215,0,0.2); }
.edit-btn { background: none; border: none; color: var(--muted); font-size: 13px; cursor: pointer; padding: 2px 4px; border-radius: 4px; transition: color 0.15s; line-height: 1; }
.edit-btn:hover { color: var(--accent); }

/* NOTES PANEL */
.notes-panel { display: none; background: var(--surface2); border: 1px solid var(--border); border-top: none; border-radius: 0 0 12px 12px; padding: 0.75rem 1rem; margin-top: -6px; padding-top: 0.9rem; }
.notes-panel.open { display: block; }
.notes-label { font-size: 10px; color: var(--muted); letter-spacing: 0.08em; text-transform: uppercase; font-family: 'Space Mono', monospace; margin-bottom: 6px; }
.notes-input { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-family: 'Syne', sans-serif; font-size: 13px; padding: 0.6rem 0.75rem; resize: none; min-height: 80px; outline: none; transition: border-color 0.2s; line-height: 1.5; }
.notes-input:focus { border-color: var(--accent2); }
.notes-input::placeholder { color: var(--muted); }

/* ALL DONE */
.all-done { background: linear-gradient(135deg, rgba(60,240,138,0.08), rgba(200,240,60,0.06)); border: 1px solid rgba(60,240,138,0.3); border-radius: 12px; padding: 1rem; text-align: center; margin-top: 1rem; display: none; }
.all-done.show { display: block; }
.all-done-title { font-size: 18px; font-weight: 800; color: var(--done); }
.all-done-sub { font-size: 12px; color: var(--muted); margin-top: 4px; }

/* XP POPUP */
@keyframes xpPop {
  0% { opacity: 0; transform: translateY(0) scale(0.8); }
  20% { opacity: 1; transform: translateY(-20px) scale(1.1); }
  80% { opacity: 1; transform: translateY(-30px) scale(1); }
  100% { opacity: 0; transform: translateY(-50px) scale(0.9); }
}
.xp-popup { position: fixed; pointer-events: none; font-family: 'Space Mono', monospace; font-size: 13px; font-weight: 700; color: var(--gold); z-index: 9999; animation: xpPop 1s ease forwards; }

/* MODALS */
.overlay { display: none; position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,0.75); align-items: center; justify-content: center; padding: 1rem; }
.overlay.show { display: flex; }
.modal { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 1.5rem; width: 100%; max-width: 360px; }
.modal-title { font-size: 16px; font-weight: 700; margin-bottom: 1rem; }
.modal-field { margin-bottom: 0.85rem; }
.modal-field label { font-size: 11px; color: var(--muted); font-family: 'Space Mono', monospace; letter-spacing: 0.05em; text-transform: uppercase; display: block; margin-bottom: 5px; }
.modal-field input, .modal-field select, .modal-field textarea {
  width: 100%; background: var(--surface2); border: 1px solid var(--border);
  border-radius: 8px; color: var(--text); font-family: 'Syne', sans-serif;
  font-size: 13px; padding: 8px 10px; outline: none; transition: border-color 0.2s;
}
.modal-field input:focus, .modal-field select:focus, .modal-field textarea:focus { border-color: var(--accent2); }
.modal-field select option { background: var(--surface2); }
.modal-field textarea { resize: none; min-height: 60px; line-height: 1.4; }
.modal-btns { display: flex; gap: 8px; margin-top: 1.25rem; }
.btn-primary { flex: 1; padding: 10px; border-radius: 8px; border: none; background: var(--accent); color: #000; font-family: 'Syne', sans-serif; font-size: 14px; font-weight: 700; cursor: pointer; }
.btn-secondary { flex: 1; padding: 10px; border-radius: 8px; border: 1px solid var(--border); background: var(--surface2); color: var(--text); font-family: 'Syne', sans-serif; font-size: 14px; cursor: pointer; }
.btn-danger { flex: 1; padding: 10px; border-radius: 8px; border: none; background: var(--accent3); color: #fff; font-family: 'Syne', sans-serif; font-size: 14px; font-weight: 700; cursor: pointer; }

@keyframes checkBounce { 0% { transform: scale(1); } 40% { transform: scale(1.15); } 100% { transform: scale(1); } }
.task.just-done .task-check { animation: checkBounce 0.3s ease; }
</style>
</head>

<header>

<main>

  </div>

  <div id="quote-card">

  </div>
</main>

<!-- RESET MODAL -->
<div class="overlay" id="reset-overlay">
  <div class="modal">
    <div class="modal-title">Reset everything?</div>

    <div class="modal-btns">
      <button class="btn-secondary" onclick="closeReset()">Cancel</button>
      <button class="btn-danger" onclick="doReset()">Reset</button>
    </div>
  </div>
</div>

<!-- EDIT TASK MODAL -->
<div class="overlay" id="edit-overlay">
  <div class="modal">
    <div class="modal-title">Edit task</div>
    <div class="modal-field">
      <label>Time</label>

    </div>
    <div class="modal-field">
      <label>Title</label>

    </div>
    <div class="modal-field">
      <label>Description</label>
      <textarea id="edit-sub" placeholder="Optional description"></textarea>
    </div>
    <div class="modal-field">
      <label>Category</label>
      <select id="edit-cat">
        <option value="hygiene">Hygiene</option>
        <option value="trading">Trading</option>
        <option value="food">Food</option>
        <option value="prep">Prep</option>
        <option value="work">Work</option>
        <option value="workout">Workout</option>
        <option value="reading">Reading</option>
        <option value="chores">Chores</option>
        <option value="anime">Chill</option>
        <option value="haircare">Hair care</option>
        <option value="shopping">Shopping</option>
      </select>
    </div>
    <div class="modal-field">
      <label>XP Value</label>
      <input type="number" id="edit-xp" placeholder="e.g. 10" min="1" max="100">
    </div>
    <div class="modal-btns">
      <button class="btn-secondary" onclick="closeEdit()">Cancel</button>
      <button class="btn-primary" onclick="saveEdit()">Save</button>
    </div>
  </div>
</div>

const LEVELS = [
  { name:'Rookie', icon:'🌱', min:0 },
  { name:'Grinder', icon:'⚡', min:200 },
  { name:'Disciplined', icon:'🔥', min:500 },
  { name:'Focused', icon:'🎯', min:1000 },
  { name:'Locked In', icon:'💎', min:2000 },
  { name:'Elite', icon:'👑', min:3500 },
];

// STATE
function loadState() {
  try { return JSON.parse(localStorage.getItem('dg_state') || '{}'); } catch { return {}; }
}
function saveState(s) { localStorage.setItem('dg_state', JSON.stringify(s)); }

function loadSchedule() {
  try {
    const saved = localStorage.getItem('dg_schedule');
    return saved ? JSON.parse(saved) : JSON.parse(JSON.stringify(DEFAULT_SCHEDULE));
  } catch { return JSON.parse(JSON.stringify(DEFAULT_SCHEDULE)); }
}
function saveSchedule() { localStorage.setItem('dg_schedule', JSON.stringify(SCHEDULE)); }

let state = loadState();
if (!state.xp) state.xp = 0;
if (!state.streak) state.streak = 0;
if (!state.lastDay) state.lastDay = null;
if (!state.done) state.done = {};
if (!state.notes) state.notes = {};

let SCHEDULE = loadSchedule();
let currentDay = new Date().getDay();
let openNotes = {}; // track which tasks have notes panel open
let editTarget = null; // {dayIdx, taskIdx}

function getTodayKey() {
  const d = new Date();
  return `${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`;
}

function getNote(dayIdx, taskIdx) {
  const key = `${dayIdx}_${taskIdx}`;
  return state.notes[key] || '';
}
function setNote(dayIdx, taskIdx, val) {
  const key = `${dayIdx}_${taskIdx}`;
  state.notes[key] = val;
  saveState(state);
}

function isTaskDone(dayIdx, taskIdx) {
  if (!state.done[dayIdx]) return false;
  return !!state.done[dayIdx][taskIdx];
}
function setTaskDone(dayIdx, taskIdx, val) {
  if (!state.done[dayIdx]) state.done[dayIdx] = {};
  state.done[dayIdx][taskIdx] = val;
}

function getDayTasks(dayIdx) { return SCHEDULE[dayIdx] || []; }

function getDayProgress(dayIdx) {
  const tasks = getDayTasks(dayIdx);
  if (!tasks.length) return { done: 0, total: 0 };
  let done = 0;
  tasks.forEach((_, i) => { if (isTaskDone(dayIdx, i)) done++; });
  return { done, total: tasks.length };
}

function getLevel(xp) {
  for (let i = LEVELS.length - 1; i >= 0; i--) {
    if (xp >= LEVELS[i].min) return i;
  }
  return 0;
}

function renderQuote() {
  const dayOfYear = Math.floor((new Date() - new Date(new Date().getFullYear(), 0, 0)) / 86400000);
  const q = QUOTES[dayOfYear % QUOTES.length];
  document.getElementById('quote-text').textContent = '"' + q.text + '"';
  document.getElementById('quote-author').textContent = '— ' + q.author;
}

function renderHeader() {
  document.getElementById('xp-badge').textContent = state.xp + ' XP';
  document.getElementById('streak-badge').textContent = '🔥 ' + state.streak;
  const lvlIdx = getLevel(state.xp);
  const lvl = LEVELS[lvlIdx];
  const nextLvl = LEVELS[Math.min(lvlIdx + 1, LEVELS.length - 1)];
  const progress = lvlIdx === LEVELS.length - 1 ? 100 :
    Math.round(((state.xp - lvl.min) / (nextLvl.min - lvl.min)) * 100);
  document.getElementById('level-icon').textContent = lvl.icon;
  document.getElementById('level-name').textContent = lvl.name;
  document.getElementById('level-sub').textContent = lvlIdx < LEVELS.length - 1
    ? `${state.xp} / ${nextLvl.min} XP to ${nextLvl.name}`
    : `MAX LEVEL — ${state.xp} XP`;
  document.getElementById('level-bar').style.width = progress + '%';
}

function renderDayNav() {
  const nav = document.getElementById('day-nav');
  nav.innerHTML = '';
  for (let i = 0; i < 7; i++) {
    const d = document.createElement('div');
    d.className = 'day-pill' + (i === currentDay ? ' active' : '');
    const prog = getDayProgress(i);
    if (prog.done > 0) d.classList.add('has-progress');
    d.innerHTML = SHORT[i] + '<div class="day-dot"></div>';
    d.onclick = () => { currentDay = i; openNotes = {}; renderAll(); };
    nav.appendChild(d);
  }
}

function renderTasks() {
  const tasks = getDayTasks(currentDay);
  const container = document.getElementById('tasks-container');
  container.innerHTML = '';

  if (!tasks.length) {
    container.innerHTML = '<div style="color:var(--muted);font-size:14px;padding:1rem 0;">No tasks scheduled.</div>';
    return;
  }

  const label = document.createElement('div');
  label.className = 'section-label';
  label.textContent = "Today's tasks";
  container.appendChild(label);

  const list = document.createElement('div');
  list.className = 'task-list';

  tasks.forEach((task, i) => {
    const done = isTaskDone(currentDay, i);
    const cat = CATEGORIES[task.cat] || CATEGORIES.hygiene;
    const note = getNote(currentDay, i);
    const notesOpen = !!openNotes[i];

    const wrap = document.createElement('div');
    wrap.className = 'task-wrap';

    const el = document.createElement('div');
    el.className = 'task' + (done ? ' done' : '') + (notesOpen ? ' notes-open' : '');
    el.style.setProperty('--task-color', cat.color);
    if (notesOpen) { el.style.borderRadius = '12px 12px 0 0'; }

    el.innerHTML = `
      <div class="task-check" onclick="handleCheck(event,${currentDay},${i},${task.xp},this)">
        <svg width="11" height="9" viewBox="0 0 12 10" fill="none">
          <path d="M1 5L4.5 8.5L11 1.5" stroke="#0a0a0f" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div class="task-body" onclick="toggleNotes(${i})">
        <div class="task-time">${task.time}</div>
        <div class="task-title">${task.title}</div>
        ${task.sub ? `<div class="task-sub">${task.sub}</div>` : ''}
        ${note ? `<div style="font-size:11px;color:var(--accent2);margin-top:4px;font-style:italic;">📝 Has notes</div>` : ''}
      </div>
      <div class="task-actions">
        <div class="task-xp">+${task.xp}</div>
        <button class="edit-btn" onclick="openEdit(event,${currentDay},${i})" title="Edit task">✎</button>
      </div>
    `;

    const notesPanel = document.createElement('div');
    notesPanel.className = 'notes-panel' + (notesOpen ? ' open' : '');
    notesPanel.innerHTML = `
      <div class="notes-label">Notes for this task</div>
      <textarea class="notes-input" placeholder="e.g. Chest day — bench press 4x8, push-ups, dips..." oninput="saveNoteInput(${currentDay},${i},this)">${note}</textarea>
    `;

    wrap.appendChild(el);
    wrap.appendChild(notesPanel);
    list.appendChild(wrap);
  });

  container.appendChild(list);
}

function renderProgress() {
  const prog = getDayProgress(currentDay);
  const pct = prog.total ? Math.round((prog.done / prog.total) * 100) : 0;
  document.getElementById('progress-bar').style.width = pct + '%';
  document.getElementById('done-count').textContent = prog.done + ' done';
  document.getElementById('total-count').textContent = prog.total + ' tasks';
  document.getElementById('today-day-name').textContent = DAYS[currentDay];
  const allDone = document.getElementById('all-done');
  if (prog.done === prog.total && prog.total > 0) {
    allDone.classList.add('show');
    document.getElementById('all-done-sub').textContent = `You crushed ${prog.total} tasks today. Streak: ${state.streak} days.`;
  } else {
    allDone.classList.remove('show');
  }
}

function renderAll() {
  renderHeader();
  renderQuote();
  renderDayNav();
  renderTasks();
  renderProgress();
}

// TICK A TASK
function handleCheck(e, dayIdx, taskIdx, xp, checkEl) {
  e.stopPropagation();
  const wasDone = isTaskDone(dayIdx, taskIdx);
  setTaskDone(dayIdx, taskIdx, !wasDone);
  if (!wasDone) {
    state.xp += xp;
    const taskEl = checkEl.closest('.task');
    taskEl.classList.add('just-done');
    setTimeout(() => taskEl.classList.remove('just-done'), 300);
    showXpPopup(xp, checkEl);
    const prog = getDayProgress(dayIdx);
    if (prog.done === prog.total) {
      state.xp += XP_BONUS_ALL;
      const today = getTodayKey();
      if (state.lastDay !== today) { state.streak++; state.lastDay = today; }
      setTimeout(() => showXpPopup(XP_BONUS_ALL, document.getElementById('today-day-name')), 600);
    }
  } else {
    state.xp = Math.max(0, state.xp - xp);
  }
  saveState(state);
  renderAll();
}

// NOTES
function toggleNotes(taskIdx) {
  openNotes[taskIdx] = !openNotes[taskIdx];
  renderTasks();
  renderProgress();
}

function saveNoteInput(dayIdx, taskIdx, el) {
  setNote(dayIdx, taskIdx, el.value);
}

// EDIT TASK
function openEdit(e, dayIdx, taskIdx) {
  e.stopPropagation();
  editTarget = { dayIdx, taskIdx };
  const task = SCHEDULE[dayIdx][taskIdx];
  document.getElementById('edit-time').value = task.time;
  document.getElementById('edit-title').value = task.title;
  document.getElementById('edit-sub').value = task.sub || '';
  document.getElementById('edit-cat').value = task.cat;
  document.getElementById('edit-xp').value = task.xp;
  document.getElementById('edit-overlay').classList.add('show');
}
function closeEdit() {
  document.getElementById('edit-overlay').classList.remove('show');
  editTarget = null;
}
function saveEdit() {
  if (!editTarget) return;
  const { dayIdx, taskIdx } = editTarget;
  SCHEDULE[dayIdx][taskIdx] = {
    time: document.getElementById('edit-time').value.trim(),
    title: document.getElementById('edit-title').value.trim(),
    sub: document.getElementById('edit-sub').value.trim(),
    cat: document.getElementById('edit-cat').value,
    xp: parseInt(document.getElementById('edit-xp').value) || 10,
  };
  saveSchedule();
  closeEdit();
  renderAll();
}

// RESET
function confirmReset() { document.getElementById('reset-overlay').classList.add('show'); }
function closeReset() { document.getElementById('reset-overlay').classList.remove('show'); }
function doReset() {
  state = { xp: 0, streak: 0, lastDay: null, done: {}, notes: state.notes || {} };
  saveState(state);
  closeReset();
  renderAll();
}

function showXpPopup(xp, el) {
  const rect = el.getBoundingClientRect();
  const popup = document.createElement('div');
  popup.className = 'xp-popup';
  popup.textContent = '+' + xp + ' XP';
  popup.style.left = (rect.left + rect.width / 2 - 20) + 'px';
  popup.style.top = (rect.top + window.scrollY) + 'px';
  document.body.appendChild(popup);
  setTimeout(() => popup.remove(), 1000);
}

renderAll();
</script>
